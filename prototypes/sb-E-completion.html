<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SB E · 카테고리 완수도</title>
<link rel="stylesheet" href="_sb-shared.css">
<style>
.sb-completion {
  display: flex;
  align-items: center;
  gap: 14px;
}
.cm-cells {
  display: flex;
  gap: 8px;
  flex: 1;
}
.cm-cell {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.cm-icon {
  font-size: 16px;
  opacity: 0.4;
  transition: opacity 0.25s ease, transform 0.3s cubic-bezier(.32, 1.5, .42, 1);
}
.cm-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 0.04em;
}
.cm-cell.is-done .cm-icon { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 6px rgba(52, 211, 153, 0.5)); }
.cm-cell.is-done .cm-label { color: #34d399; font-weight: 800; }
.cm-stat {
  font-family: 'Archivo Black', sans-serif;
  font-size: 16px;
  letter-spacing: -0.02em;
  color: #34d399;
  flex-shrink: 0;
  display: flex;
  align-items: baseline;
  gap: 1px;
}
.cm-stat .denom {
  font-size: 11px;
  color: var(--text3);
  font-weight: 600;
}
</style>
</head>
<body>
<div class="head">
  <a class="back" href="index.html">← 목록</a>
  <div class="title"><div class="opt">SB FILLER E</div><div class="t">오늘 4 카테고리 완수도</div></div>
</div>

<div class="phone">
  <div class="sb">
    <div class="sb-hero">
      <div class="sb-canvas-wrap"></div>
      <div class="sb-quote-block">
        <div class="sb-quote">"한 칸이 다음 칸을 부른다."</div>
        <div class="sb-tier-caption"><span class="dash">─</span><b>저항자</b></div>
      </div>
    </div>
    <div class="sb-bottom">
      <div class="sb-bottom-label">오늘 완수</div>
      <div class="sb-completion">
        <div class="cm-cells">
          <div class="cm-cell is-done"><span class="cm-icon">🥗</span><span class="cm-label">식단</span></div>
          <div class="cm-cell"><span class="cm-icon">💪</span><span class="cm-label">운동</span></div>
          <div class="cm-cell is-done"><span class="cm-icon">🔁</span><span class="cm-label">루틴</span></div>
          <div class="cm-cell"><span class="cm-icon">✓</span><span class="cm-label">할일</span></div>
        </div>
        <div class="cm-stat">2<span class="denom">/4</span></div>
      </div>
    </div>
  </div>
</div>

<div class="note">
  <b>E — 4 카테고리 완수도</b>: 식단·운동·루틴·할일 완수 여부 + N/4 stat. 완수 = 초록 highlight.<br>
  <b>장점</b>: 즉시 actionable ("운동 / 할일 남았다"). 행동 유도 강함. progress 한 눈에.<br>
  <b>단점</b>: 카드 위 cc-cube chip 과 정보 *완전히 중복* — 같은 데이터 두 번 노출. 우선순위 따져야 함 (chip 제거 / sb 제거 / 둘 다 유지).
</div>
</body></html>

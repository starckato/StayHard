<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Stay Hard · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700;900&family=Archivo+Black&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
<style>
  :root {
    --bg:#0a0a0c; --surface:#141418; --surface2:#1c1c22;
    --border:#24242c; --border2:#2a2a34;
    --text:#eaeaea; --text2:#a8a8b3; --text3:#6b6b78;
    --accent:#ff4d4d; --green:#34d399; --amber:#f59e0b; --blue:#38bdf8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased;}
  .page{max-width:960px;margin:0 auto;padding:40px 24px 60px;}
  .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap;}
  .hdr h1{margin:0;font-size:22px;font-weight:900;letter-spacing:0.3px;}
  .hdr .sub{font-size:11px;color:var(--text3);margin-top:3px;font-family:'DM Mono',monospace;}
  .hdr-actions{display:flex;gap:8px;}
  .btn{padding:9px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;}
  .btn:hover{background:var(--border);}
  .btn.primary{background:linear-gradient(135deg,var(--accent),#ff6b35);color:#fff;border-color:transparent;}
  .card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .card .label{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:10px;}
  .grid{display:grid;gap:14px;}
  .grid.cols-2{grid-template-columns:repeat(2,1fr);}
  @media (max-width:420px){.grid.cols-2{grid-template-columns:1fr;}.page{padding:24px 16px;}}
  .stat-big{font-size:34px;font-weight:900;font-family:'Archivo Black',sans-serif;line-height:1;}
  .stat-mid{font-size:22px;font-weight:800;font-family:'Archivo Black',sans-serif;line-height:1.1;}
  .stat-hint{font-size:10px;color:var(--text3);margin-top:6px;}
  .north-star{background:linear-gradient(135deg,rgba(255,77,77,0.18),rgba(255,77,77,0.04));border:1px solid rgba(255,77,77,0.35);}
  .north-star .stat-big{color:var(--accent);}
  .triad{display:flex;justify-content:space-around;}
  .triad>div{text-align:center;}
  .bar-row{margin-bottom:10px;}
  .bar-row .bar-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;}
  .bar-row .bar-label .name{color:var(--text2);text-transform:uppercase;letter-spacing:0.3px;}
  .bar-row .bar-label .val{color:var(--accent);font-family:'DM Mono',monospace;}
  .bar-track{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#ff6b35);transition:width .4s;}
  .funnel-step{margin-bottom:10px;}
  .funnel-step .bar-track{height:12px;border-radius:6px;}
  .table{width:100%;border-collapse:collapse;font-size:12px;}
  .table th{text-align:left;padding:8px 6px;font-size:10px;color:var(--text3);font-weight:700;letter-spacing:0.5px;border-bottom:1px solid var(--border);}
  .table td{padding:8px 6px;border-bottom:1px solid rgba(255,255,255,0.04);font-family:'DM Mono',monospace;color:var(--text2);}
  .table td.name{font-family:'DM Sans',sans-serif;color:var(--text);}
  .table td.val-right{text-align:right;}
  .chart-wrap{position:relative;height:220px;margin-top:8px;}
  .row-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;}
  .row-item:last-child{border-bottom:none;}
  .row-item .rank{color:var(--text3);font-family:'DM Mono',monospace;margin-right:10px;}
  .row-item .score{color:var(--accent);font-family:'DM Mono',monospace;font-weight:700;}
  .section{margin-bottom:18px;}
  .section h2{margin:0 0 10px;font-size:11px;color:var(--text3);font-weight:700;letter-spacing:0.8px;text-transform:uppercase;}
  .status-box{max-width:520px;margin:80px auto;padding:32px 28px;background:var(--surface);border:1px solid var(--border);border-radius:16px;text-align:center;}
  .status-box h1{margin:0 0 10px;font-size:22px;font-weight:900;}
  .status-box p{color:var(--text2);font-size:13px;line-height:1.7;margin:0 0 18px;}
  .status-box .actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .err-details{background:#2a1010;border:1px solid rgba(255,77,77,0.3);border-radius:8px;padding:12px;margin:14px 0;text-align:left;font-family:'DM Mono',monospace;font-size:11px;color:#ffb5b5;word-break:break-all;white-space:pre-wrap;}
  .sql-snippet{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:12px;margin:12px 0;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);text-align:left;white-space:pre-wrap;position:relative;}
  .sql-snippet .copy{position:absolute;top:8px;right:8px;padding:4px 8px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;color:var(--text3);font-size:10px;cursor:pointer;}
</style>
</head>
<body>

<!-- Bootstrap screen (fallback status / errors) -->
<div id="boot-screen">
  <div class="status-box">
    <h1 id="boot-title">📊 Admin</h1>
    <p id="boot-msg">세션 확인 중...</p>
    <div id="boot-extra"></div>
    <div class="actions" id="boot-actions"></div>
  </div>
</div>

<!-- Admin dashboard -->
<div id="admin-screen" style="display:none;">
  <div class="page">
    <div class="hdr">
      <div>
        <h1>📊 Stay Hard Admin</h1>
        <div class="sub" id="admin-as-of">—</div>
      </div>
      <div class="hdr-actions">
        <button class="btn" id="refresh-btn">↻ 새로고침</button>
        <button class="btn" id="logout-btn">로그아웃</button>
      </div>
    </div>
    <div id="dashboard-body">
      <div class="status-box"><p>불러오는 중...</p></div>
    </div>
  </div>
</div>

<script>
const SB_URL='https://uvaosxhsjscigheyymus.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2YW9zeGhzanNjaWdoZXl5bXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODExNjQsImV4cCI6MjA5MDE1NzE2NH0.aS1ZxN0ds8CUs3q_dMTFlEwjvNFgCH7JwY-tg4q0NA8';
const sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true}});

let _trendChart=null;
let _currentSession=null;

function showBoot(title,msg,extraHtml,actions){
  document.getElementById('admin-screen').style.display='none';
  document.getElementById('boot-screen').style.display='block';
  document.getElementById('boot-title').textContent=title;
  document.getElementById('boot-msg').innerHTML=msg;
  document.getElementById('boot-extra').innerHTML=extraHtml||'';
  const ac=document.getElementById('boot-actions');
  ac.innerHTML='';
  (actions||[]).forEach(a=>{
    const btn=document.createElement('button');
    btn.className='btn'+(a.primary?' primary':'');
    btn.textContent=a.label;
    btn.onclick=a.onClick;
    ac.appendChild(btn);
  });
}

function showDashboard(){
  document.getElementById('boot-screen').style.display='none';
  document.getElementById('admin-screen').style.display='block';
}

function sqlBlock(sql){
  const escaped=sql.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const id='sql-'+Math.random().toString(36).slice(2,8);
  return `<div class="sql-snippet" id="${id}"><button class="copy" onclick="(async()=>{await navigator.clipboard.writeText(document.getElementById('${id}').innerText.replace(/^Copy\\s*/,'')); this.textContent='Copied!'; setTimeout(()=>this.textContent='Copy',1500)})()">Copy</button>${escaped}</div>`;
}

// ─── Bootstrap ───
async function bootstrap(){
  let session;
  try{
    const res=await sb.auth.getSession();
    session=res.data.session;
  }catch(e){
    return showBoot('⚠️ 연결 오류',
      'Supabase 접근이 실패했어요. 네트워크 또는 브라우저 차단 확인.',
      `<div class="err-details">${e.message||e}</div>`,
      [{label:'다시 시도',primary:true,onClick:()=>location.reload()}]
    );
  }
  if(!session){
    return showBoot('🔐 로그인 필요',
      '메인 앱에서 먼저 로그인한 뒤 다시 이 페이지를 열어주세요.<br>같은 브라우저 세션을 공유해요.',
      '',
      [{label:'메인 앱 열기',primary:true,onClick:()=>location.href='/'}]
    );
  }
  _currentSession=session;
  await checkAdminAndLoad(session.user);
}

async function checkAdminAndLoad(user){
  const {data:profile,error}=await sb.from('profiles')
    .select('id,display_name,is_admin').eq('id',user.id).maybeSingle();
  if(error){
    return showBoot('⚠️ 프로필 조회 실패',
      'RLS 정책 또는 연결 문제로 프로필을 읽을 수 없어요.',
      `<div class="err-details">${error.message}\ncode: ${error.code||'—'}\nhint: ${error.hint||'—'}</div>`,
      [{label:'다시 시도',primary:true,onClick:()=>location.reload()},
       {label:'로그아웃',onClick:async()=>{await sb.auth.signOut();location.reload();}}]
    );
  }
  if(!profile){
    return showBoot('⚠️ 프로필 없음',
      `유저 ${user.email} 의 프로필이 없어요. 아래 SQL 을 Supabase SQL Editor 에서 실행하세요.`,
      sqlBlock(`INSERT INTO profiles (id, display_name, is_admin)\nVALUES ('${user.id}', '${(user.email||'').split('@')[0]}', true);`),
      [{label:'다시 시도',primary:true,onClick:()=>location.reload()}]
    );
  }
  if(!profile.is_admin){
    return showBoot('🚫 관리자 아님',
      `<b>${profile.display_name||user.email}</b> 계정에는 admin 권한이 부여돼 있지 않아요.<br>아래 SQL 을 Supabase SQL Editor 에서 실행한 뒤 새로고침하세요.`,
      sqlBlock(`UPDATE profiles SET is_admin = true\nWHERE id = '${user.id}';`),
      [{label:'새로고침',primary:true,onClick:()=>location.reload()},
       {label:'로그아웃',onClick:async()=>{await sb.auth.signOut();location.reload();}}]
    );
  }
  showDashboard();
  await loadDashboard();
}

// ─── Dashboard load ───
async function loadDashboard(){
  const body=document.getElementById('dashboard-body');
  body.innerHTML='<div class="status-box"><p>📊 불러오는 중...</p></div>';
  const {data,error}=await sb.rpc('admin_dashboard');
  if(error){
    const isMissing=/function.*admin_dashboard.*does not exist|pgrst202|pgrst203/i.test(error.message||'');
    body.innerHTML=`
      <div class="card" style="border-color:var(--accent);">
        <div class="label" style="color:var(--accent);">⚠️ admin_dashboard() RPC 실패</div>
        <div class="err-details">${(error.message||error).toString()}\ncode: ${error.code||'—'}\nhint: ${error.hint||'—'}\ndetails: ${error.details||'—'}</div>
        ${isMissing?`
          <div style="margin-top:14px;color:var(--text2);font-size:12px;line-height:1.6;">
            migration 003 이 완전히 실행되지 않았어요. GitHub 에서 전체 SQL 을 복사해 Supabase SQL Editor 에 붙여넣고 Run 하세요:
            <div style="margin-top:8px;"><a href="https://raw.githubusercontent.com/starckato/StayHard/main/migrations/003_analytics_events.sql" target="_blank" style="color:var(--accent);">migrations/003_analytics_events.sql 전체 보기 →</a></div>
          </div>
        `:''}
      </div>`;
    return;
  }
  render(data);
}

function render(d){
  document.getElementById('admin-as-of').textContent=
    `as of ${d.as_of} · ${new Date(d.generated_at).toLocaleString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;

  const body=document.getElementById('dashboard-body');
  const act=d.activation||{};
  const feat=d.feature_adoption_today||{};
  const stickiness=d.mau?Math.round((d.dau||0)/d.mau*100):0;
  const fpct=k=>feat.dau?Math.round((feat[k]||0)/feat.dau*100):0;

  body.innerHTML=`
    <div class="grid cols-2 section">
      <div class="card north-star">
        <div class="label">⭐ NORTH STAR · WAE</div>
        <div class="stat-big">${d.wae||0}</div>
        <div class="stat-hint">3+ log days / last 7 days</div>
      </div>
      <div class="card">
        <div class="label">DAU · WAU · MAU</div>
        <div style="font-family:'DM Mono',monospace;font-size:20px;font-weight:800;color:var(--text);">
          ${d.dau||0} · ${d.wau||0} · ${d.mau||0}
        </div>
        <div class="stat-hint">stickiness ${stickiness}% (DAU/MAU)</div>
      </div>
    </div>

    <div class="section">
      <h2>📥 Signups</h2>
      <div class="card"><div class="triad">
        <div><div class="stat-mid" style="color:var(--accent);">${d.signups_7d||0}</div><div class="stat-hint">last 7d</div></div>
        <div><div class="stat-mid">${d.signups_30d||0}</div><div class="stat-hint">last 30d</div></div>
        <div><div class="stat-mid" style="color:var(--text2);">${d.signups_total||0}</div><div class="stat-hint">all time</div></div>
      </div></div>
    </div>

    <div class="section">
      <h2>🔥 Activation Funnel</h2>
      <div class="card">${renderFunnel(act)}</div>
    </div>

    <div class="section">
      <h2>📈 14-Day Active Trend</h2>
      <div class="card"><div class="chart-wrap"><canvas id="trend-canvas"></canvas></div></div>
    </div>

    <div class="section">
      <h2>🎯 Feature Adoption (Today · DAU ${feat.dau||0})</h2>
      <div class="card">
        ${['meals','workouts','water','weight','mandatory','targets'].map(k=>{
          const v=feat[k]||0,pct=fpct(k);
          return `<div class="bar-row"><div class="bar-label"><span class="name">${k}</span><span class="val">${v} · ${pct}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div></div>`;
        }).join('')}
      </div>
    </div>

    <div class="section">
      <h2>📅 D7 Retention (Last 8 Weeks)</h2>
      <div class="card">${renderCohorts(d.cohorts||[])}</div>
    </div>

    <div class="grid cols-2 section">
      <div class="card">
        <div class="label">📊 Event Counts (7d)</div>
        ${renderEventCounts(d.event_counts_7d||{})}
      </div>
      <div class="card">
        <div class="label">🏆 Competitions</div>
        <div class="triad" style="padding-top:10px;">
          <div><div class="stat-mid" style="color:var(--green);">${d.competitions?.active||0}</div><div class="stat-hint">active</div></div>
          <div><div class="stat-mid">${d.competitions?.completed||0}</div><div class="stat-hint">done</div></div>
          <div><div class="stat-mid" style="color:var(--text2);">${d.competitions?.waiting||0}</div><div class="stat-hint">waiting</div></div>
        </div>
      </div>
    </div>

    <div class="grid cols-2 section">
      <div class="card">
        <div class="label">👑 Top 10 Users</div>
        ${(d.top_users||[]).map((u,i)=>`<div class="row-item"><div><span class="rank">${String(i+1).padStart(2,'0')}</span>${u.name||'—'}</div><div class="score">${(u.score||0).toLocaleString()}</div></div>`).join('')||'<div style="color:var(--text3);padding:10px;text-align:center;">no users</div>'}
      </div>
      <div class="card">
        <div class="label">📤 Recent Shares</div>
        ${((d.recent_shares||[]).length)?(d.recent_shares||[]).map(s=>`<div class="row-item" style="flex-direction:column;align-items:stretch;gap:2px;"><div style="display:flex;justify-content:space-between;"><span>${s.name||'—'}</span><span style="color:var(--text3);font-family:'DM Mono',monospace;font-size:10px;">${new Date(s.created_at).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</span></div><div style="color:var(--text3);font-size:10px;font-family:'DM Mono',monospace;">mode=${s.meta?.mode||'?'} · view=${s.meta?.view||'?'}</div></div>`).join(''):'<div style="color:var(--text3);padding:10px;text-align:center;">no shares yet</div>'}
      </div>
    </div>
  `;

  setTimeout(()=>renderTrendChart(d.trend_14d||[]),50);
}

function renderFunnel(act){
  const steps=[
    {key:'signups',label:'① 가입'},
    {key:'onboarded',label:'② 온보딩 완료'},
    {key:'first_logged',label:'③ 첫 기록'},
    {key:'three_day_week1',label:'④ 첫 주 3일+ 기록'},
    {key:'activated',label:'⑤ 활성화 (100pt+)'}
  ];
  const max=act.signups||1;
  return steps.map((s,i)=>{
    const v=act[s.key]||0;
    const pct=Math.round(v/max*100);
    const prev=i>0?(act[steps[i-1].key]||0):null;
    const conv=(prev!==null&&prev>0)?Math.round(v/prev*100):null;
    return `<div class="funnel-step"><div class="bar-label"><span class="name">${s.label}</span><span class="val" style="font-family:'DM Mono',monospace;color:var(--text);">${v} <span style="color:var(--text3);">· ${pct}%</span>${conv!==null?` <span style="color:var(--amber);">· conv ${conv}%</span>`:''}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div></div>`;
  }).join('');
}

function renderCohorts(cohorts){
  if(!cohorts||!cohorts.length)return '<div style="color:var(--text3);padding:10px;text-align:center;">데이터 부족 (아직 가입자 없음)</div>';
  return `<table class="table"><thead><tr><th>COHORT (week)</th><th class="val-right">SIGNUPS</th><th class="val-right">D7 RETAINED</th><th class="val-right">RATE</th></tr></thead><tbody>${cohorts.map(c=>{
    const rate=c.cohort_size?Math.round(c.retained_d7/c.cohort_size*100):0;
    const color=rate>=40?'var(--green)':rate>=20?'var(--amber)':(rate>0?'var(--accent)':'var(--text3)');
    return `<tr><td class="name">${c.cohort_week}</td><td class="val-right">${c.cohort_size}</td><td class="val-right">${c.retained_d7}</td><td class="val-right" style="color:${color};font-weight:700;">${rate}%</td></tr>`;
  }).join('')}</tbody></table>`;
}

function renderEventCounts(counts){
  const entries=Object.entries(counts||{}).sort((a,b)=>b[1]-a[1]);
  if(!entries.length)return '<div style="color:var(--text3);padding:10px;text-align:center;">아직 이벤트 없음</div>';
  const max=entries[0][1]||1;
  return entries.map(([name,cnt])=>{
    const pct=Math.round(cnt/max*100);
    return `<div class="bar-row"><div class="bar-label"><span class="name" style="font-family:'DM Mono',monospace;">${name}</span><span class="val">${cnt}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div></div>`;
  }).join('');
}

function renderTrendChart(trend){
  const canvas=document.getElementById('trend-canvas');
  if(!canvas||typeof Chart==='undefined')return;
  if(_trendChart){try{_trendChart.destroy();}catch(e){}}
  const labels=trend.map(t=>{const d=new Date(t.day);return `${d.getMonth()+1}/${d.getDate()}`;});
  const vals=trend.map(t=>t.active||0);
  _trendChart=new Chart(canvas,{
    type:'line',
    data:{labels,datasets:[{label:'Active',data:vals,borderColor:'#ff4d4d',backgroundColor:'rgba(255,77,77,0.12)',fill:true,tension:0.3,pointRadius:3,pointBackgroundColor:'#ff4d4d',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6b6b78',font:{size:11}},grid:{display:false}},y:{beginAtZero:true,ticks:{color:'#6b6b78',font:{size:11},precision:0},grid:{color:'rgba(255,255,255,0.04)'}}}}
  });
}

document.getElementById('logout-btn').addEventListener('click',async()=>{await sb.auth.signOut();location.reload();});
document.getElementById('refresh-btn').addEventListener('click',loadDashboard);

bootstrap();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Data</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
<style>
  :root {
    --bg:#0c0c0c; --panel:#141414; --panel2:#1a1a1a;
    --border:#2a2a2a; --border2:#333;
    --ink:#e5e5e5; --ink2:#a0a0a0; --ink3:#6b6b6b;
    --pos:#34d399; --warn:#fbbf24; --neg:#f87171; --hl:#60a5fa;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:12px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{padding:14px 20px 48px;max-width:1320px;margin:0 auto;}
  .top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:14px;flex-wrap:wrap;}
  .top h1{margin:0;font-size:12px;font-weight:600;color:var(--ink);letter-spacing:0.3px;}
  .top .gen{color:var(--ink3);font-size:11px;}
  .top button{background:var(--panel2);border:1px solid var(--border);color:var(--ink2);padding:4px 10px;border-radius:3px;font-family:inherit;font-size:11px;cursor:pointer;margin-left:6px;}
  .top button:hover{background:var(--border);}
  /* KPI grid */
  .kpi-row{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
  @media (max-width:900px){.kpi-row{grid-template-columns:1fr 1fr;}}
  @media (max-width:480px){.kpi-row{grid-template-columns:1fr;}}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:12px 14px;position:relative;}
  .kpi .k-label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
  .kpi .k-hint{font-size:10px;color:var(--ink3);margin-top:2px;}
  .kpi .k-val{font-size:38px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.05;margin:6px 0 2px;font-family:ui-monospace,monospace;}
  .kpi .k-val.small{font-size:22px;}
  .kpi.north{border-color:#3a2828;}
  .kpi.north .k-val{color:var(--ink);}
  .triad{display:flex;justify-content:space-between;gap:8px;margin-top:4px;}
  .triad>div{flex:1;}
  .triad .tri-val{font-size:22px;font-variant-numeric:tabular-nums;font-weight:600;}
  .triad .tri-label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:0.8px;}
  .delta{display:inline-block;font-size:11px;font-variant-numeric:tabular-nums;margin-left:6px;}
  .delta.pos{color:var(--pos);}
  .delta.neg{color:var(--neg);}
  .delta.flat{color:var(--ink3);}
  /* Sections */
  section{margin-top:18px;background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:12px 14px;}
  section h2{margin:0 0 10px;font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;font-weight:600;display:flex;justify-content:space-between;align-items:baseline;}
  section h2 .h2-sub{color:var(--ink3);font-size:10px;font-weight:400;letter-spacing:0.3px;text-transform:none;}
  /* Funnel */
  .funnel-row{display:grid;grid-template-columns:140px 50px 1fr 60px 60px;gap:8px;align-items:center;font-size:11px;margin-bottom:6px;font-variant-numeric:tabular-nums;}
  .funnel-row .fn-label{color:var(--ink2);}
  .funnel-row .fn-count{text-align:right;color:var(--ink);}
  .funnel-row .fn-bar{height:16px;background:var(--panel2);border-radius:2px;overflow:hidden;position:relative;}
  .funnel-row .fn-bar-fill{height:100%;background:var(--ink2);}
  .funnel-row .fn-pct{text-align:right;color:var(--ink3);}
  .funnel-row .fn-conv{text-align:right;color:var(--warn);}
  /* Adoption bars */
  .adopt-row{display:grid;grid-template-columns:120px 1fr 80px;gap:10px;align-items:center;font-size:11px;margin-bottom:5px;font-variant-numeric:tabular-nums;}
  .adopt-row .a-label{color:var(--ink2);text-transform:uppercase;font-size:10px;letter-spacing:0.3px;}
  .adopt-row .a-bar{height:10px;background:var(--panel2);border-radius:2px;overflow:hidden;}
  .adopt-row .a-bar-fill{height:100%;background:var(--hl);}
  .adopt-row .a-val{text-align:right;color:var(--ink3);}
  /* Tables */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media (max-width:700px){.grid2{grid-template-columns:1fr;}}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:11px;}
  th{text-align:left;padding:5px 8px;color:var(--ink3);font-weight:500;border-bottom:1px solid var(--border);background:var(--panel2);white-space:nowrap;font-size:10px;letter-spacing:0.3px;text-transform:uppercase;}
  td{padding:4px 8px;border-bottom:1px solid var(--panel2);color:var(--ink);vertical-align:top;}
  tr:hover td{background:var(--panel2);}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;}
  td.muted{color:var(--ink3);}
  td.wrap{white-space:normal;word-break:break-all;}
  td.pos{color:var(--pos);}
  td.warn{color:var(--warn);}
  td.neg{color:var(--neg);}
  .chart-wrap{position:relative;height:180px;margin-top:4px;}
  /* Auth screens */
  .err{background:#2a1010;border:1px solid #5a2020;color:#ffb3b3;padding:12px;border-radius:4px;font-size:11px;white-space:pre-wrap;margin:14px 0;}
  .card{max-width:380px;margin:80px auto;padding:20px;border:1px solid var(--border);border-radius:6px;background:var(--panel);}
  .card p{color:var(--ink2);margin:0 0 12px;font-size:12px;line-height:1.6;}
  .card input,.card button{width:100%;padding:9px 12px;margin-bottom:8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--ink);font-family:inherit;font-size:12px;box-sizing:border-box;}
  .card button{background:var(--panel2);cursor:pointer;}
  .card button:hover{background:var(--border);}
  .card .e{color:#ff8888;font-size:11px;margin-top:4px;min-height:14px;}
  pre{margin:0;font:inherit;color:var(--ink3);white-space:pre-wrap;word-break:break-all;}
  a{color:var(--hl);}
  /* Bonus admin form */
  .bonus-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  @media (max-width:700px){.bonus-grid{grid-template-columns:1fr;}}
  .bonus-row{display:flex;flex-direction:column;gap:4px;}
  .bonus-row label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:0.4px;font-weight:600;}
  .bonus-row input, .bonus-row select, .bonus-row textarea{width:100%;padding:7px 9px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--ink);font-family:inherit;font-size:12px;box-sizing:border-box;}
  .bonus-row textarea{resize:vertical;min-height:64px;font-family:inherit;}
  .bonus-row input:focus, .bonus-row select:focus, .bonus-row textarea:focus{outline:none;border-color:var(--hl);}
  .bonus-actions{display:flex;gap:8px;margin-top:6px;}
  .bonus-actions button{padding:8px 14px;background:#5a2020;color:var(--ink);border:1px solid #7a2020;border-radius:3px;font-family:inherit;font-size:11px;cursor:pointer;font-weight:600;letter-spacing:0.3px;}
  .bonus-actions button:hover{background:#7a2828;}
  .bonus-actions button:disabled{opacity:0.5;cursor:not-allowed;}
  .bonus-actions button.ghost{background:var(--panel2);border-color:var(--border);color:var(--ink2);font-weight:400;}
  .bonus-actions button.ghost:hover{background:var(--border);}
  .bonus-result{font-size:11px;margin-top:8px;padding:6px 10px;border-radius:3px;min-height:14px;font-variant-numeric:tabular-nums;}
  .bonus-result.ok{background:#103018;border:1px solid #2a5a3a;color:var(--pos);}
  .bonus-result.err{background:#301010;border:1px solid #5a2020;color:#ffb3b3;}
  .bonus-row .hint{font-size:10px;color:var(--ink3);font-weight:400;text-transform:none;letter-spacing:0;}
  .bonus-chip{display:inline-block;font-size:10px;padding:1px 7px;border-radius:999px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;}
  .bonus-chip.shown{background:#1a3a1a;color:var(--pos);border:1px solid #2a5a2a;}
  .bonus-chip.unshown{background:#3a2a10;color:var(--warn);border:1px solid #5a3a20;}
  .bonus-del{background:none;border:none;color:var(--neg);cursor:pointer;font-family:inherit;font-size:11px;padding:2px 6px;}
  .bonus-del:hover{text-decoration:underline;}
</style>
</head>
<body>

<div id="boot"></div>

<div id="app" class="wrap" style="display:none;">
  <div class="top">
    <div>
      <h1>QROK · Data</h1>
      <div class="gen" id="gen-at">—</div>
    </div>
    <div>
      <button id="refresh-btn">refresh</button>
      <button id="logout-btn">logout</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<script>
const SB_URL='https://uvaosxhsjscigheyymus.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2YW9zeGhzanNjaWdoZXl5bXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODExNjQsImV4cCI6MjA5MDE1NzE2NH0.aS1ZxN0ds8CUs3q_dMTFlEwjvNFgCH7JwY-tg4q0NA8';
const sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true}});

let _trendChart=null;

const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtTime=t=>{if(!t)return'—';const d=new Date(t);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};
const fmtDate=d=>d?String(d).slice(0,10):'—';
const n=v=>(v==null?0:v).toLocaleString();

function delta(cur,prev){
  const c=cur||0, p=prev||0;
  if(p===0 && c===0) return '<span class="delta flat">—</span>';
  if(p===0) return `<span class="delta pos">+${c} new</span>`;
  const diff=c-p;
  const pct=Math.round(diff/p*100);
  const cls=diff>0?'pos':diff<0?'neg':'flat';
  const sign=diff>0?'+':'';
  return `<span class="delta ${cls}">${sign}${diff} (${sign}${pct}%)</span>`;
}

function showBoot(html){
  document.getElementById('app').style.display='none';
  document.getElementById('boot').innerHTML=`<div class="card">${html}</div>`;
}

async function main(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){
    showBoot(`
      <p>Log in to view data.</p>
      <input id="e" type="email" placeholder="email" autocomplete="email">
      <input id="p" type="password" placeholder="password" autocomplete="current-password">
      <button id="lb">Sign in</button>
      <div class="e" id="le"></div>
    `);
    document.getElementById('lb').onclick=async()=>{
      const e=document.getElementById('e').value.trim();
      const p=document.getElementById('p').value;
      const err=document.getElementById('le');
      err.textContent='';
      const {error}=await sb.auth.signInWithPassword({email:e,password:p});
      if(error){err.textContent=error.message;return;}
      location.reload();
    };
    return;
  }
  const {data:profile,error:pErr}=await sb.from('profiles').select('id,display_name,is_admin').eq('id',session.user.id).maybeSingle();
  if(pErr){showBoot(`<p>Profile fetch error</p><div class="err">${esc(pErr.message)}</div>`);return;}
  if(!profile||!profile.is_admin){
    showBoot(`
      <p>Account <b>${esc(session.user.email)}</b> is not admin. Run in Supabase SQL Editor:</p>
      <pre style="background:var(--bg);padding:10px;border-radius:4px;border:1px solid var(--border);color:var(--ink2);">UPDATE profiles SET is_admin = true
WHERE id = '${session.user.id}';</pre>
      <button onclick="location.reload()" style="margin-top:10px;">Refresh</button>
      <button onclick="(async()=>{await sb.auth.signOut();location.reload();})()" style="margin-top:4px;background:var(--panel2);">Logout</button>
    `);
    return;
  }
  document.getElementById('boot').innerHTML='';
  document.getElementById('app').style.display='block';
  await load();
}

async function load(){
  const content=document.getElementById('content');
  content.innerHTML='<div style="color:var(--ink3);padding:20px 0;">loading...</div>';
  // 30초 timeout — RPC 무한 대기 방지
  const timeout = (p, ms, label) => Promise.race([
    p,
    new Promise((_,rej)=>setTimeout(()=>rej(new Error(`${label} timeout after ${ms}ms`)), ms))
  ]);
  // 병렬: 기본 dashboard + retention metrics
  let dashRes, retRes;
  try {
    [dashRes, retRes] = await Promise.all([
      timeout(sb.rpc('admin_dashboard'), 30000, 'admin_dashboard'),
      timeout(sb.rpc('admin_retention_summary'), 30000, 'admin_retention_summary').catch(e=>({data:null,error:e})),
    ]);
  } catch(e) {
    content.innerHTML = `<div class="err">RPC failed/timed out: ${esc(e.message||String(e))}<br><br>가능한 원인:<br>- DB 연결 지연<br>- admin RPC 권한 문제<br>- 마이그레이션 미적용<br><br><button onclick="location.reload()" style="margin-top:10px;">다시 시도</button> <button onclick="(async()=>{await sb.auth.signOut();location.reload();})()" style="margin-top:10px;">로그아웃</button></div>`;
    return;
  }
  const {data,error}=dashRes;
  if(error){
    const missing=/does not exist/i.test(error.message||'');
    content.innerHTML=`<div class="err">admin_dashboard() failed: ${esc(error.message)}
code: ${error.code||'—'}
hint: ${error.hint||'—'}${missing?'\n\nRun migrations/003 then 004 in Supabase SQL Editor.':''}</div>`;
    return;
  }
  if(!('all_users' in data)){
    content.innerHTML=`<div class="err">admin_dashboard() needs migration 004. Open in Supabase SQL Editor:
<a href="https://raw.githubusercontent.com/starckato/StayHard/main/migrations/004_admin_dashboard_full_data.sql" target="_blank">migrations/004_admin_dashboard_full_data.sql</a></div>`;
    return;
  }
  // retention 데이터 합침
  data._retention=retRes&&retRes.data?retRes.data:null;
  data._retention_error=retRes&&retRes.error?retRes.error.message:null;
  render(data);
}

function renderRetentionSection(r,errMsg){
  if(errMsg){
    return `<section><h2>retention metrics <span class="h2-sub">M1-M10 · admin RPC error</span></h2>
      <div class="err" style="font-size:11px;">admin_retention_summary() failed: ${esc(errMsg)}</div></section>`;
  }
  if(!r){
    return `<section><h2>retention metrics</h2><div class="muted" style="font-size:11px;">no data</div></section>`;
  }
  const fmt=v=>v==null?'—':typeof v==='number'?v.toLocaleString():v;
  const fmtPct=(num,denom)=>!denom?'—':(num/denom*100).toFixed(1)+'%';
  let h='';
  // ── M1: Time-to-first-cube ──
  const m1=r.m1||{};
  h+=`<section><h2>M1 · time-to-first-cube <span class="h2-sub">activation 진입 속도</span></h2>
    <div class="adopt-row"><div>전체 유저</div><div>${fmt(m1.total_users)}</div><div class="num"></div></div>
    <div class="adopt-row"><div>첫 큐브 획득</div><div>${fmt(m1.with_first_cube)} (${fmtPct(m1.with_first_cube,m1.total_users)})</div><div class="num"></div></div>
    <div class="adopt-row"><div>p50 시간</div><div>${m1.p50_minutes!=null?(+m1.p50_minutes).toFixed(1)+'분':'—'}</div><div class="num"></div></div>
    <div class="adopt-row"><div>p95 시간</div><div>${m1.p95_minutes!=null?(+m1.p95_minutes).toFixed(1)+'분':'—'}</div><div class="num"></div></div>
  </section>`;
  // ── M2: D1 returning gold ──
  const m2=r.m2||{};
  h+=`<section><h2>M2 · D1 gold returning <span class="h2-sub">첫날 gold 받은 유저의 다음날 복귀</span></h2>
    <div class="adopt-row"><div>가입 day0 gold</div><div>${fmt(m2.had_gold_d0)} / ${fmt(m2.total)} (${fmtPct(m2.had_gold_d0,m2.total)})</div><div class="num"></div></div>
    <div class="adopt-row"><div>D1 복귀</div><div>${fmt(m2.returned_d1)} / ${fmt(m2.total)} (${fmtPct(m2.returned_d1,m2.total)})</div><div class="num"></div></div>
    <div class="adopt-row"><div>gold + 복귀</div><div>${fmt(m2.gold_and_return)} (${fmtPct(m2.gold_and_return,m2.had_gold_d0)} of gold)</div><div class="num"></div></div>
  </section>`;
  // ── M3: Opt-in rate ──
  const m3=r.m3||[];
  if(m3.length){
    h+=`<section><h2>M3 · notification opt-in</h2><div class="table-wrap"><table><thead><tr>
      <th>event</th><th>trigger</th><th>result</th><th class="num">count</th></tr></thead><tbody>`;
    h+=m3.map(x=>`<tr><td>${esc(x.event)}</td><td>${esc(x.trigger||'—')}</td><td>${esc(x.result||'—')}</td><td class="num">${fmt(x.n)}</td></tr>`).join('');
    h+=`</tbody></table></div></section>`;
  } else {
    h+=`<section><h2>M3 · notification opt-in</h2><div class="muted" style="font-size:11px;">no opt-in events yet</div></section>`;
  }
  // ── M4: Friend funnel ──
  const m4=r.m4||[];
  if(m4.length){
    h+=`<section><h2>M4 · friend funnel <span class="h2-sub">코드 조회 → 공유 → 입력 → 추가</span></h2>`;
    const order=['friend_code_viewed','friend_code_shared','friend_code_entered','friend_added'];
    const labels={friend_code_viewed:'코드 조회',friend_code_shared:'공유',friend_code_entered:'코드 입력',friend_added:'친구 추가'};
    const top=Math.max(...m4.map(x=>x.unique_users||0),1);
    order.forEach(k=>{
      const row=m4.find(x=>x.event===k);
      const u=row?row.unique_users:0;
      const pct=(u/top)*100;
      h+=`<div class="funnel-row"><div>${labels[k]}</div><div class="num">${u}</div><div style="background:#222;height:14px;border-radius:2px;overflow:hidden;"><div style="height:100%;background:var(--accent);width:${pct}%;"></div></div><div class="num">${row?row.events:0}</div><div class="num">${fmtPct(u,top)}</div></div>`;
    });
    h+=`</section>`;
  }
  // ── M5: Nudge ──
  const m5=r.m5||[];
  if(m5.length){
    h+=`<section><h2>M5 · nudge ratio <span class="h2-sub">최근 4주</span></h2><div class="table-wrap"><table><thead><tr>
      <th>week</th><th>event</th><th class="num">n</th></tr></thead><tbody>`;
    h+=m5.map(x=>`<tr><td>${esc(x.week)}</td><td>${esc(x.event)}</td><td class="num">${fmt(x.n)}</td></tr>`).join('');
    h+=`</tbody></table></div></section>`;
  }
  // ── M6: Returner reactivation ──
  const m6=r.m6||{};
  h+=`<section><h2>M6 · returner reactivation <span class="h2-sub">grace 활성 후 7일 내 복귀</span></h2>
    <div class="adopt-row"><div>grace 활성</div><div>${fmt(m6.activated)}</div><div class="num"></div></div>
    <div class="adopt-row"><div>7일 내 복귀</div><div>${fmt(m6.reactivated_7d)} (${fmtPct(m6.reactivated_7d,m6.activated)})</div><div class="num"></div></div>
  </section>`;
  // ── M7: Red cube W1 → W2 ──
  const m7=r.m7||{};
  h+=`<section><h2>M7 · red cube W1 → W2 <span class="h2-sub">첫주 crimson 받은 유저의 2주차 유지</span></h2>
    <div class="adopt-row"><div>전체</div><div>${fmt(m7.total)}</div><div class="num"></div></div>
    <div class="adopt-row"><div>W1 crimson 받음</div><div>${fmt(m7.had_crimson_w1)} (${fmtPct(m7.had_crimson_w1,m7.total)})</div><div class="num"></div></div>
    <div class="adopt-row"><div>W2 활성</div><div>${fmt(m7.active_w2)} (${fmtPct(m7.active_w2,m7.total)})</div><div class="num"></div></div>
    <div class="adopt-row"><div>crimson + W2 활성</div><div>${fmt(m7.crimson_and_active)} (${fmtPct(m7.crimson_and_active,m7.had_crimson_w1)} of crimson)</div><div class="num"></div></div>
  </section>`;
  // ── M8: Perfect day ──
  const m8=r.m8||[];
  if(m8.length){
    h+=`<section><h2>M8 · perfect day <span class="h2-sub">최근 30 records</span></h2><div class="table-wrap"><table><thead><tr>
      <th>week</th><th>user</th><th class="num">count</th></tr></thead><tbody>`;
    h+=m8.slice(0,15).map(x=>`<tr><td>${esc(x.week)}</td><td class="muted">${esc(String(x.user_id||'').slice(0,8))}</td><td class="num">${fmt(x.count)}</td></tr>`).join('');
    h+=`</tbody></table></div></section>`;
  } else {
    h+=`<section><h2>M8 · perfect day</h2><div class="muted" style="font-size:11px;">no perfect days yet</div></section>`;
  }
  // ── M9: SB dwell ──
  const m9=r.m9||[];
  if(m9.length){
    h+=`<section><h2>M9 · status band dwell <span class="h2-sub">최근 14일 (sec)</span></h2><div class="table-wrap"><table><thead><tr>
      <th>day</th><th class="num">p50</th><th class="num">p95</th><th class="num">samples</th></tr></thead><tbody>`;
    h+=m9.map(x=>`<tr><td>${esc(x.day)}</td><td class="num">${(+x.p50||0).toFixed(1)}</td><td class="num">${(+x.p95||0).toFixed(1)}</td><td class="num">${fmt(x.samples)}</td></tr>`).join('');
    h+=`</tbody></table></div></section>`;
  }
  // ── M10: Tab split ──
  const m10=r.m10||[];
  if(m10.length){
    h+=`<section><h2>M10 · tab split</h2>`;
    const top=Math.max(...m10.map(x=>x.visits||0),1);
    m10.forEach(x=>{
      const pct=(x.visits/top)*100;
      h+=`<div class="funnel-row"><div>${esc(x.tab)}</div><div class="num">${fmt(x.visits)}</div><div style="background:#222;height:14px;border-radius:2px;overflow:hidden;"><div style="height:100%;background:var(--accent);width:${pct}%;"></div></div><div class="num">${fmt(x.unique_users)}</div><div class="num">${fmtPct(x.visits,top)}</div></div>`;
    });
    h+=`</section>`;
  }
  return h;
}

  html+=`</section>`;

  document.getElementById('content').innerHTML=html;

  // Bonus panel hooks

  // Trainer admin section

}

async function loadTrainerSection(){
  const root = document.getElementById('trainer-section');
  if(!root) return;
  // 병렬: 트레이너 전체 + invite codes
  const [trRes, codeRes] = await Promise.all([
    sb.from('trainers').select('id, trainer_name, bio, certification_status, certification_note, certification_reviewed_at, created_at, profiles!trainers_id_fkey(username, display_name)').order('created_at', {ascending:false}),
    sb.from('trainer_invite_codes').select('*').order('code_type').order('created_at', {ascending:false}),
  ]);
  const trainers = trRes.data || [];
  const codes = codeRes.data || [];
  const pending = trainers.filter(t=>t.certification_status==='pending');
  const approved = trainers.filter(t=>t.certification_status==='approved');
  let h = '';
  // ── pending list ──
  h += `<div style="margin:14px 0 6px;font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;">pending (${pending.length})</div>`;
  if(pending.length===0){
    h += `<div class="muted" style="font-size:11px;padding:8px 0;">대기 중인 신청 없음.</div>`;
  } else {
    h += `<div class="table-wrap"><table><thead><tr><th>이름</th><th>유저</th><th>소개</th><th>신청</th><th>action</th></tr></thead><tbody>`;
    for(const t of pending){
      const p = t.profiles||{};
      h += `<tr>
        <td><b>${esc(t.trainer_name)}</b></td>
        <td class="muted">@${esc(p.username||'—')}</td>
        <td class="muted" style="font-size:11px;">${esc(t.bio||'—')}</td>
        <td class="muted">${fmtTime(t.created_at)}</td>
        <td><button onclick="approveTrainer('${t.id}')" style="background:var(--ok);color:#0a0a0c;border:none;padding:6px 12px;border-radius:6px;font-weight:700;cursor:pointer;font-size:11px;">승인</button>
            <button onclick="rejectTrainer('${t.id}')" style="background:var(--err);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-weight:700;cursor:pointer;font-size:11px;margin-left:4px;">반려</button></td>
      </tr>`;
    }
    h += `</tbody></table></div>`;
  }
  // ── approved list (간단) ──
  h += `<div style="margin:18px 0 6px;font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;">approved (${approved.length})</div>`;
  if(approved.length){
    h += `<div class="table-wrap"><table><thead><tr><th>이름</th><th>유저</th><th>승인일</th><th>note</th></tr></thead><tbody>`;
    for(const t of approved){
      const p = t.profiles||{};
      h += `<tr><td>${esc(t.trainer_name)}</td><td class="muted">@${esc(p.username||'—')}</td><td class="muted">${fmtTime(t.certification_reviewed_at)}</td><td class="muted" style="font-size:11px;">${esc(t.certification_note||'—')}</td></tr>`;
    }
    h += `</tbody></table></div>`;
  }
  // ── invite codes ──
  h += `<div style="margin:18px 0 6px;font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;">invite codes</div>`;
  h += `<div style="margin-bottom:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <input id="ic-code" placeholder="코드 (예: GYM2026)" style="text-transform:uppercase;font-family:'DM Mono',monospace;flex:1;min-width:140px;" />
    <select id="ic-type"><option value="founder">founder</option><option value="ad" selected>ad</option><option value="referral">referral</option></select>
    <input id="ic-max" type="number" placeholder="max 사용 (비우면 무제한)" style="width:160px;" />
    <input id="ic-desc" placeholder="설명 (선택)" style="flex:1;min-width:120px;" />
    <button onclick="adminCreateInviteCode()" style="background:var(--ok);color:#0a0a0c;border:none;padding:7px 14px;border-radius:6px;font-weight:700;cursor:pointer;">+ 코드 발급</button>
  </div>`;
  if(codes.length===0){
    h += `<div class="muted" style="font-size:11px;">코드 없음.</div>`;
  } else {
    h += `<div class="table-wrap"><table><thead><tr><th>code</th><th>type</th><th class="num">사용</th><th>설명</th><th>만료</th></tr></thead><tbody>`;
    for(const c of codes){
      const left = c.max_uses==null?'∞':(c.max_uses - c.used_count);
      h += `<tr>
        <td><code style="font-family:'DM Mono',monospace;font-weight:700;color:var(--accent);">${esc(c.code)}</code></td>
        <td class="muted">${esc(c.code_type)}</td>
        <td class="num">${c.used_count} / ${c.max_uses==null?'∞':c.max_uses}</td>
        <td class="muted" style="font-size:11px;">${esc(c.description||'—')}</td>
        <td class="muted">${c.expires_at?fmtTime(c.expires_at):'—'}</td>
      </tr>`;
    }
    h += `</tbody></table></div>`;
  }
  root.innerHTML = h;
}

async function approveTrainer(id){
  if(!confirm('이 트레이너를 승인합니까?')) return;
  const {error} = await sb.rpc('admin_approve_trainer', {p_trainer_id:id, p_note:'admin manual approval'});
  if(error){ alert('승인 실패: '+error.message); return; }
  await loadTrainerSection();
}
async function rejectTrainer(id){
  const note = prompt('반려 사유 (선택):');
  const {error} = await sb.from('trainers').update({certification_status:'rejected', certification_note:note||'rejected by admin', certification_reviewed_at: new Date().toISOString()}).eq('id', id);
  if(error){ alert('반려 실패: '+error.message); return; }
  await loadTrainerSection();
}
async function adminCreateInviteCode(){
  const code = (document.getElementById('ic-code').value||'').trim().toUpperCase();
  const type = document.getElementById('ic-type').value;
  const maxUses = document.getElementById('ic-max').value ? parseInt(document.getElementById('ic-max').value, 10) : null;
  const desc = (document.getElementById('ic-desc').value||'').trim();
  if(!code){ alert('코드 입력 필요.'); return; }
  const {error} = await sb.from('trainer_invite_codes').insert({
    code, code_type:type, max_uses:maxUses, description:desc||null
  });
  if(error){ alert('발급 실패: '+error.message); return; }
  await loadTrainerSection();
}

    BONUS_TEMPLATES.map(t=>`<option value="${esc(t.key)}">${esc(t.label)}</option>`).join('');

function applyBonusTemplate(){
  const sel=document.getElementById('bg-template');
  const key=sel?sel.value:'';
  if(!key)return;
  const t=BONUS_TEMPLATES.find(x=>x.key===key);
  if(!t)return;
  const setIf=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v;};
  setIf('bg-event',t.key);
  setIf('bg-title',t.title);
  setIf('bg-message',t.message);
  setIf('bg-points',t.points);
  setIf('bg-icon',t.icon);
}

function resetBonusForm(){
  ['bg-email','bg-event','bg-title','bg-message'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const p=document.getElementById('bg-points');if(p)p.value=100;
  const i=document.getElementById('bg-icon');if(i)i.value='🏆';
  const s=document.getElementById('bg-template');if(s)s.value='';
  const r=document.getElementById('bg-result');if(r){r.style.display='none';r.textContent='';}
}

function _bonusMsg(cls,text){
  const r=document.getElementById('bg-result');
  if(!r)return;
  r.className='bonus-result '+cls;
  r.style.display='block';
  r.textContent=text;
}

async function submitBonus(){
  const btn=document.getElementById('bg-submit');
  const email=(document.getElementById('bg-email').value||'').trim();
  const event_key=(document.getElementById('bg-event').value||'').trim();
  const title=(document.getElementById('bg-title').value||'').trim();
  const message=(document.getElementById('bg-message').value||'').trim();
  const points=parseInt(document.getElementById('bg-points').value||'0',10);
  const icon=(document.getElementById('bg-icon').value||'🏆').trim()||'🏆';
  if(!email){_bonusMsg('err','email is required');return;}
  if(!event_key){_bonusMsg('err','event_key is required');return;}
  if(!title){_bonusMsg('err','title is required');return;}
  if(!message){_bonusMsg('err','message is required');return;}
  if(!Number.isFinite(points)){_bonusMsg('err','points must be a number');return;}
  btn.disabled=true;btn.textContent='granting…';
  try{
    const {data,error}=await sb.rpc('grant_bonus_by_email',{
      p_email:email, p_event_key:event_key, p_title:title,
      p_message:message, p_points:points, p_icon:icon
    });
    if(error){_bonusMsg('err','RPC error: '+error.message+(error.code?' ('+error.code+')':''));return;}
    if(data&&data.ok){
      _bonusMsg('ok',`✓ granted #${data.grant_id} to ${email} · ${points}pt · event=${event_key}`);
      loadRecentGrants();
    } else if(data&&data.error==='not_admin'){
      _bonusMsg('err','세션이 admin 이 아닙니다. profiles.is_admin=true 확인 후 재로그인하세요.');
    } else if(data&&data.error==='user_not_found'){
      _bonusMsg('err',`해당 이메일의 유저가 없습니다: ${email}`);
    } else {
      _bonusMsg('err','unknown: '+JSON.stringify(data));
    }
  }catch(e){_bonusMsg('err','network: '+(e.message||e));}
  finally{btn.disabled=false;btn.textContent='🎁 Grant bonus';}
}

async function loadRecentGrants(){
  const box=document.getElementById('bg-list');
  if(!box)return;
  box.innerHTML='<div style="color:var(--ink3);font-size:11px;padding:6px 0;">loading grants…</div>';
  try{
    const {data,error}=await sb.from('bonus_grants')
      .select('id,event_key,title,points,icon,shown,shown_at,created_at,user_id')
      .order('created_at',{ascending:false}).limit(25);
    if(error){
      if(/does not exist|bonus_grants/i.test(error.message||'')){
        box.innerHTML=`<div class="err" style="margin:6px 0;">bonus_grants 테이블이 없습니다. migrations/005_bonus_grants.sql 먼저 실행하세요.</div>`;
      } else {
        box.innerHTML=`<div class="err" style="margin:6px 0;">load failed: ${esc(error.message)}</div>`;
      }
      return;
    }
    if(!data||!data.length){
      box.innerHTML='<div style="color:var(--ink3);font-size:11px;padding:6px 0;">no grants yet</div>';
      return;
    }
    // Enrich with email via users list from last dashboard payload (fallback to user_id slice)
    // We don't have users map here — fetch from admin_dashboard cached? Simpler: show user_id short.
    // Try to fetch auth.users via profiles-join (admin policy)
    const userIds=[...new Set(data.map(r=>r.user_id))];
    let userMap={};
    try{
      const {data:prof}=await sb.from('profiles').select('id,display_name').in('id',userIds);
      (prof||[]).forEach(p=>{userMap[p.id]={name:p.display_name||''};});
    }catch(e){}
    let html=`<div class="table-wrap"><table><thead><tr>
      <th>when</th><th>event_key</th><th>user</th><th>title</th>
      <th class="num">pts</th><th>status</th><th></th>
    </tr></thead><tbody>`;
    data.forEach(r=>{
      const u=userMap[r.user_id]||{};
      const userLabel=u.name||r.user_id?.slice(0,8)||'—';
      const status=r.shown
        ? `<span class="bonus-chip shown">claimed</span><div class="hint" style="margin-top:2px;">${fmtTime(r.shown_at)}</div>`
        : `<span class="bonus-chip unshown">pending</span>`;
      html+=`<tr>
        <td class="muted">${fmtTime(r.created_at)}</td>
        <td><code style="font-size:10px;color:var(--ink2);">${esc(r.event_key)}</code></td>
        <td>${esc(userLabel)}</td>
        <td>${esc(r.icon||'')} ${esc(r.title)}</td>
        <td class="num">${r.points}</td>
        <td>${status}</td>
        <td><button class="bonus-del" onclick="revokeBonus(${r.id},${r.shown?'true':'false'},${r.points})">${r.shown?'delete (−pts)':'delete'}</button></td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
    box.innerHTML=html;
  }catch(e){
    box.innerHTML=`<div class="err" style="margin:6px 0;">load failed: ${esc(e.message||e)}</div>`;
  }
}

async function toggleExclude(userId,nextValue,btn){
  const was=btn.textContent;
  btn.disabled=true;btn.textContent='…';
  try{
    const {data,error}=await sb.rpc('set_user_excluded',{p_user_id:userId,p_excluded:nextValue});
    if(error){
      if(/function.*does not exist|set_user_excluded/i.test(error.message||'')){
        alert('set_user_excluded() RPC가 없습니다. migrations/006_exclude_users_from_dashboard.sql 먼저 실행하세요.');
      } else {
        alert('toggle failed: '+error.message);
      }
      btn.disabled=false;btn.textContent=was;return;
    }
    if(data&&data.ok){
      // Refresh dashboard so KPIs/trends re-aggregate without this user
      load();
    } else if(data&&data.error==='not_admin'){
      alert('세션이 admin 이 아닙니다.');
      btn.disabled=false;btn.textContent=was;
    } else {
      alert('unknown: '+JSON.stringify(data));
      btn.disabled=false;btn.textContent=was;
    }
  }catch(e){
    alert('toggle failed: '+(e.message||e));
    btn.disabled=false;btn.textContent=was;
  }
}

async function revokeBonus(id,wasClaimed,points){
  const warn=wasClaimed
    ? `이미 수령된 그랜트입니다. 삭제 시 유저의 total_score 에서 ${points}점 차감됩니다. 계속할까요?`
    : `그랜트 #${id} 삭제할까요? (미수령이라 점수 영향 없음)`;
  if(!confirm(warn))return;
  try{
    // If already claimed, subtract points from user's total_score first
    if(wasClaimed){
      const {data:row}=await sb.from('bonus_grants').select('user_id,points').eq('id',id).maybeSingle();
      if(row&&row.user_id){
        // Fetch current score, subtract, update
        const {data:p}=await sb.from('profiles').select('total_score').eq('id',row.user_id).maybeSingle();
        const cur=+(p?.total_score)||0;
        const newScore=Math.max(0,cur-(row.points||0));
        await sb.from('profiles').update({total_score:newScore}).eq('id',row.user_id);
      }
    }
    const {error}=await sb.from('bonus_grants').delete().eq('id',id);
    if(error){alert('delete failed: '+error.message);return;}
    loadRecentGrants();
  }catch(e){alert('revoke failed: '+(e.message||e));}
}

function renderTrend(trend){
  const canvas=document.getElementById('trend-canvas');
  if(!canvas||typeof Chart==='undefined')return;
  if(_trendChart){try{_trendChart.destroy();}catch(e){}}
  const labels=trend.map(t=>{const d=new Date(t.day);return `${d.getMonth()+1}/${d.getDate()}`;});
  const vals=trend.map(t=>t.active||0);
  _trendChart=new Chart(canvas,{
    type:'line',
    data:{labels,datasets:[{label:'DAU',data:vals,borderColor:'#60a5fa',backgroundColor:'rgba(96,165,250,0.08)',fill:true,tension:0.25,pointRadius:2.5,pointBackgroundColor:'#60a5fa',borderWidth:1.5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6b6b6b',font:{size:10}},grid:{display:false}},y:{beginAtZero:true,ticks:{color:'#6b6b6b',font:{size:10},precision:0},grid:{color:'rgba(255,255,255,0.04)'}}}}
  });
}

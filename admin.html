<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Stay Hard · Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700;900&family=Archivo+Black&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #24242c;
    --border2: #2a2a34;
    --text: #eaeaea;
    --text2: #a8a8b3;
    --text3: #6b6b78;
    --accent: #ff4d4d;
    --accent-bd: rgba(255,77,77,0.35);
    --green: #34d399;
    --amber: #f59e0b;
    --blue: #38bdf8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 960px; margin: 0 auto; padding: 40px 24px 60px; }
  .hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .hdr h1 { margin: 0; font-size: 22px; font-weight: 900; letter-spacing: 0.3px; }
  .hdr .sub { font-size: 11px; color: var(--text3); margin-top: 3px; font-family: 'DM Mono', monospace; }
  .hdr-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    padding: 9px 14px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text2);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s;
  }
  .btn:hover { background: var(--border); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent), #ff6b35);
    color: #fff;
    border-color: transparent;
  }
  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .card .label {
    font-size: 10px;
    color: var(--text3);
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .grid { display: grid; gap: 14px; }
  .grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
  @media (max-width: 700px) {
    .grid.cols-3, .grid.cols-4 { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 420px) {
    .grid.cols-2, .grid.cols-3, .grid.cols-4 { grid-template-columns: 1fr; }
    .page { padding: 24px 16px; }
  }
  .stat-big {
    font-size: 34px;
    font-weight: 900;
    font-family: 'Archivo Black', sans-serif;
    line-height: 1;
    color: var(--text);
  }
  .stat-mid { font-size: 22px; font-weight: 800; font-family: 'Archivo Black', sans-serif; line-height: 1.1; }
  .stat-hint { font-size: 10px; color: var(--text3); margin-top: 6px; }
  .north-star {
    background: linear-gradient(135deg, rgba(255,77,77,0.18), rgba(255,77,77,0.04));
    border: 1px solid rgba(255,77,77,0.35);
  }
  .north-star .stat-big { color: var(--accent); }
  .triad { display: flex; justify-content: space-around; }
  .triad > div { text-align: center; }
  .bar-row { margin-bottom: 10px; }
  .bar-row .bar-label {
    display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px;
  }
  .bar-row .bar-label .name { color: var(--text2); text-transform: uppercase; letter-spacing: 0.3px; }
  .bar-row .bar-label .val { color: var(--accent); font-family: 'DM Mono', monospace; }
  .bar-track {
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #ff6b35);
    transition: width .4s;
  }
  .funnel-step { margin-bottom: 10px; }
  .funnel-step .bar-track { height: 12px; border-radius: 6px; }
  .table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .table th {
    text-align: left; padding: 8px 6px;
    font-size: 10px; color: var(--text3);
    font-weight: 700; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  .table td { padding: 8px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); font-family: 'DM Mono', monospace; color: var(--text2); }
  .table td.name { font-family: 'DM Sans', sans-serif; color: var(--text); }
  .table td.val-right { text-align: right; }
  .chart-wrap { position: relative; height: 220px; margin-top: 8px; }
  .row-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 13px;
  }
  .row-item:last-child { border-bottom: none; }
  .row-item .rank { color: var(--text3); font-family: 'DM Mono', monospace; margin-right: 10px; }
  .row-item .score { color: var(--accent); font-family: 'DM Mono', monospace; font-weight: 700; }
  .section { margin-bottom: 18px; }
  .section h2 {
    margin: 0 0 10px;
    font-size: 11px;
    color: var(--text3);
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  /* Login screen */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    width: 100%; max-width: 360px;
    padding: 32px 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
  }
  .login-card h1 {
    margin: 0 0 6px;
    font-size: 22px;
    font-weight: 900;
  }
  .login-card .hint { color: var(--text3); font-size: 12px; margin-bottom: 22px; }
  .login-card input {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 10px;
  }
  .login-card input:focus { outline: none; border-color: var(--accent); }
  .login-card button {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), #ff6b35);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    margin-top: 6px;
  }
  .login-card button:disabled { opacity: 0.6; cursor: not-allowed; }
  .err { color: var(--accent); font-size: 12px; margin-top: 10px; text-align: center; min-height: 16px; }
  .loading { color: var(--text3); text-align: center; padding: 60px 20px; font-size: 13px; }
  .forbidden { color: var(--accent); text-align: center; padding: 60px 20px; font-size: 14px; line-height: 1.6; }
  .forbidden strong { display: block; font-size: 18px; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen" style="display:none;">
  <div class="login-wrap">
    <div class="login-card">
      <h1>📊 Admin</h1>
      <div class="hint">Stay Hard 대시보드에 접근하려면 관리자 계정으로 로그인하세요.</div>
      <form id="login-form" autocomplete="on">
        <input type="email" id="login-email" placeholder="이메일" autocomplete="email" required>
        <input type="password" id="login-pw" placeholder="비밀번호" autocomplete="current-password" required>
        <button type="submit" id="login-btn">로그인</button>
        <div class="err" id="login-err"></div>
      </form>
    </div>
  </div>
</div>

<!-- Loading screen -->
<div id="loading-screen" class="loading" style="display:none;">확인 중...</div>

<!-- Forbidden screen -->
<div id="forbidden-screen" style="display:none;">
  <div class="login-wrap">
    <div class="login-card">
      <div class="forbidden">
        <strong>🚫 접근 권한 없음</strong>
        이 계정에는 admin 권한이 부여돼 있지 않아요.<br>
        관리자에게 문의하세요.
        <div style="margin-top:20px;"><button class="btn" id="logout-forbidden">로그아웃</button></div>
      </div>
    </div>
  </div>
</div>

<!-- Admin dashboard -->
<div id="admin-screen" style="display:none;">
  <div class="page">
    <div class="hdr">
      <div>
        <h1>📊 Stay Hard Admin</h1>
        <div class="sub" id="admin-as-of">—</div>
      </div>
      <div class="hdr-actions">
        <button class="btn" id="refresh-btn">↻ 새로고침</button>
        <button class="btn" id="logout-btn">로그아웃</button>
      </div>
    </div>
    <div id="dashboard-body">
      <div class="loading">불러오는 중...</div>
    </div>
  </div>
</div>

<script>
// ─── Config ───
const SB_URL = 'https://uvaosxhsjscigheyymus.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2YW9zeGhzanNjaWdoZXl5bXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODExNjQsImV4cCI6MjA5MDE1NzE2NH0.aS1ZxN0ds8CUs3q_dMTFlEwjvNFgCH7JwY-tg4q0NA8';
const sb = supabase.createClient(SB_URL, SB_KEY);

let _trendChart = null;

// ─── Screen routing ───
function showScreen(id) {
  ['login-screen','loading-screen','forbidden-screen','admin-screen'].forEach(s => {
    const el = document.getElementById(s);
    if (el) el.style.display = (s === id) ? 'block' : 'none';
  });
}

// ─── Auth flow ───
async function bootstrap() {
  showScreen('loading-screen');
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { showScreen('login-screen'); return; }
  await afterLogin(session.user);
}

async function afterLogin(user) {
  showScreen('loading-screen');
  const { data: profile, error } = await sb.from('profiles')
    .select('id, display_name, is_admin')
    .eq('id', user.id)
    .maybeSingle();
  if (error) {
    console.error('[afterLogin] profile fetch failed', error);
    showScreen('forbidden-screen');
    return;
  }
  if (!profile?.is_admin) {
    showScreen('forbidden-screen');
    return;
  }
  showScreen('admin-screen');
  await loadDashboard();
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  const err = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = '로그인 중...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  btn.disabled = false;
  btn.textContent = '로그인';
  if (error) {
    err.textContent = error.message.includes('Invalid') ? '이메일 또는 비밀번호가 올바르지 않아요.' : error.message;
    return;
  }
  await afterLogin(data.user);
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.reload();
});
document.getElementById('logout-forbidden').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.reload();
});
document.getElementById('refresh-btn').addEventListener('click', loadDashboard);

// ─── Dashboard load ───
async function loadDashboard() {
  const body = document.getElementById('dashboard-body');
  body.innerHTML = '<div class="loading">📊 불러오는 중...</div>';
  const { data, error } = await sb.rpc('admin_dashboard');
  if (error) {
    body.innerHTML = `
      <div class="card" style="border-color:var(--accent);">
        <div class="label" style="color:var(--accent);">⚠️ 불러오기 실패</div>
        <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);word-break:break-all;padding:10px;background:var(--surface);border-radius:6px;">${error.message || error}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:12px;line-height:1.6;">
          · migrations/003_analytics_events.sql 이 실행됐는지 Supabase에서 확인<br>
          · profiles 테이블에서 is_admin=true 로 설정돼 있는지 확인
        </div>
      </div>`;
    return;
  }
  render(data);
}

function render(d) {
  const asOf = document.getElementById('admin-as-of');
  const gen = new Date(d.generated_at);
  asOf.textContent = `as of ${d.as_of} · ${gen.toLocaleString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;

  const body = document.getElementById('dashboard-body');
  const act = d.activation || {};
  const feat = d.feature_adoption_today || {};
  const stickiness = d.mau ? Math.round((d.dau || 0) / d.mau * 100) : 0;
  const fpct = k => feat.dau ? Math.round((feat[k] || 0) / feat.dau * 100) : 0;

  body.innerHTML = `
    <!-- North Star + DAU/WAU/MAU -->
    <div class="grid cols-2 section">
      <div class="card north-star">
        <div class="label">⭐ NORTH STAR · WAE</div>
        <div class="stat-big">${d.wae || 0}</div>
        <div class="stat-hint">3+ log days within last 7 days</div>
      </div>
      <div class="card">
        <div class="label">DAU · WAU · MAU</div>
        <div style="font-family:'DM Mono',monospace;font-size:20px;font-weight:800;color:var(--text);">
          ${d.dau || 0} · ${d.wau || 0} · ${d.mau || 0}
        </div>
        <div class="stat-hint">stickiness ${stickiness}% (DAU/MAU)</div>
      </div>
    </div>

    <!-- Signups -->
    <div class="section">
      <h2>📥 Signups</h2>
      <div class="card">
        <div class="triad">
          <div>
            <div class="stat-mid" style="color:var(--accent);">${d.signups_7d || 0}</div>
            <div class="stat-hint">last 7 days</div>
          </div>
          <div>
            <div class="stat-mid">${d.signups_30d || 0}</div>
            <div class="stat-hint">last 30 days</div>
          </div>
          <div>
            <div class="stat-mid" style="color:var(--text2);">${d.signups_total || 0}</div>
            <div class="stat-hint">all time</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Activation funnel -->
    <div class="section">
      <h2>🔥 Activation Funnel</h2>
      <div class="card">${renderFunnel(act)}</div>
    </div>

    <!-- 14-day trend -->
    <div class="section">
      <h2>📈 14-Day Active Trend</h2>
      <div class="card">
        <div class="chart-wrap"><canvas id="trend-canvas"></canvas></div>
      </div>
    </div>

    <!-- Feature adoption -->
    <div class="section">
      <h2>🎯 Feature Adoption (Today · DAU ${feat.dau || 0})</h2>
      <div class="card">
        ${['meals','workouts','water','weight','mandatory','targets'].map(k => {
          const v = feat[k] || 0, pct = fpct(k);
          return `<div class="bar-row">
            <div class="bar-label"><span class="name">${k}</span><span class="val">${v} · ${pct}%</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- D7 cohorts -->
    <div class="section">
      <h2>📅 D7 Retention (Last 8 Weeks)</h2>
      <div class="card">${renderCohorts(d.cohorts || [])}</div>
    </div>

    <!-- Event counts + Competitions -->
    <div class="grid cols-2 section">
      <div class="card">
        <div class="label">📊 Event Counts (7d)</div>
        ${renderEventCounts(d.event_counts_7d || {})}
      </div>
      <div class="card">
        <div class="label">🏆 Competitions</div>
        <div class="triad" style="padding-top:10px;">
          <div>
            <div class="stat-mid" style="color:var(--green);">${d.competitions?.active || 0}</div>
            <div class="stat-hint">active</div>
          </div>
          <div>
            <div class="stat-mid">${d.competitions?.completed || 0}</div>
            <div class="stat-hint">completed</div>
          </div>
          <div>
            <div class="stat-mid" style="color:var(--text2);">${d.competitions?.waiting || 0}</div>
            <div class="stat-hint">waiting</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Top users + Recent shares -->
    <div class="grid cols-2 section">
      <div class="card">
        <div class="label">👑 Top 10 Users</div>
        ${(d.top_users || []).map((u, i) => `
          <div class="row-item">
            <div><span class="rank">${String(i+1).padStart(2,'0')}</span>${u.name || '—'}</div>
            <div class="score">${(u.score || 0).toLocaleString()}</div>
          </div>
        `).join('') || '<div class="loading">no users</div>'}
      </div>
      <div class="card">
        <div class="label">📤 Recent Shares</div>
        ${((d.recent_shares || []).length) ? (d.recent_shares || []).map(s => `
          <div class="row-item" style="flex-direction:column;align-items:stretch;gap:2px;">
            <div style="display:flex;justify-content:space-between;">
              <span>${s.name || '—'}</span>
              <span style="color:var(--text3);font-family:'DM Mono',monospace;font-size:10px;">
                ${new Date(s.created_at).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}
              </span>
            </div>
            <div style="color:var(--text3);font-size:10px;font-family:'DM Mono',monospace;">
              mode=${s.meta?.mode || '?'} · view=${s.meta?.view || '?'}
            </div>
          </div>
        `).join('') : '<div class="loading">no shares yet</div>'}
      </div>
    </div>
  `;

  setTimeout(() => renderTrendChart(d.trend_14d || []), 50);
}

function renderFunnel(act) {
  const steps = [
    { key: 'signups', label: '① 가입' },
    { key: 'onboarded', label: '② 온보딩 완료' },
    { key: 'first_logged', label: '③ 첫 기록' },
    { key: 'three_day_week1', label: '④ 첫 주 3일+ 기록' },
    { key: 'activated', label: '⑤ 활성화 (100pt+)' }
  ];
  const max = act.signups || 1;
  return steps.map((s, i) => {
    const v = act[s.key] || 0;
    const pct = Math.round(v / max * 100);
    const prev = i > 0 ? (act[steps[i-1].key] || 0) : null;
    const conv = (prev !== null && prev > 0) ? Math.round(v / prev * 100) : null;
    return `<div class="funnel-step">
      <div class="bar-label">
        <span class="name">${s.label}</span>
        <span class="val" style="font-family:'DM Mono',monospace;color:var(--text);">
          ${v} <span style="color:var(--text3);">· ${pct}%</span>
          ${conv !== null ? ` <span style="color:var(--amber);">· conv ${conv}%</span>` : ''}
        </span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div>
    </div>`;
  }).join('');
}

function renderCohorts(cohorts) {
  if (!cohorts || !cohorts.length) return '<div class="loading">데이터 부족</div>';
  return `<table class="table">
    <thead><tr>
      <th>COHORT (Mon of week)</th>
      <th class="val-right">SIGNUPS</th>
      <th class="val-right">D7 RETAINED</th>
      <th class="val-right">RATE</th>
    </tr></thead>
    <tbody>${cohorts.map(c => {
      const rate = c.cohort_size ? Math.round(c.retained_d7 / c.cohort_size * 100) : 0;
      const color = rate >= 40 ? 'var(--green)' : rate >= 20 ? 'var(--amber)' : (rate > 0 ? 'var(--accent)' : 'var(--text3)');
      return `<tr>
        <td class="name">${c.cohort_week}</td>
        <td class="val-right">${c.cohort_size}</td>
        <td class="val-right">${c.retained_d7}</td>
        <td class="val-right" style="color:${color};font-weight:700;">${rate}%</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function renderEventCounts(counts) {
  const entries = Object.entries(counts || {}).sort((a, b) => b[1] - a[1]);
  if (!entries.length) return '<div class="loading">아직 이벤트 없음</div>';
  const max = entries[0][1] || 1;
  return entries.map(([name, cnt]) => {
    const pct = Math.round(cnt / max * 100);
    return `<div class="bar-row">
      <div class="bar-label"><span class="name" style="font-family:'DM Mono',monospace;">${name}</span><span class="val">${cnt}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div>
    </div>`;
  }).join('');
}

function renderTrendChart(trend) {
  const canvas = document.getElementById('trend-canvas');
  if (!canvas || typeof Chart === 'undefined') return;
  if (_trendChart) { try { _trendChart.destroy(); } catch(e) {} }
  const labels = trend.map(t => {
    const d = new Date(t.day);
    return `${d.getMonth() + 1}/${d.getDate()}`;
  });
  const vals = trend.map(t => t.active || 0);
  _trendChart = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets: [{
      label: 'Active users', data: vals,
      borderColor: '#ff4d4d',
      backgroundColor: 'rgba(255,77,77,0.12)',
      fill: true, tension: 0.3,
      pointRadius: 3, pointBackgroundColor: '#ff4d4d',
      borderWidth: 2
    }]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#6b6b78', font: { size: 11 } }, grid: { display: false } },
        y: { beginAtZero: true, ticks: { color: '#6b6b78', font: { size: 11 }, precision: 0 }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

// Kick off
bootstrap();
</script>

</body>
</html>

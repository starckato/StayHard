<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Data</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  html,body{margin:0;padding:0;background:#0c0c0c;color:#ddd;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:12px;line-height:1.5;}
  .wrap{padding:16px 20px 40px;max-width:1400px;margin:0 auto;}
  h1{margin:0 0 4px;font-size:13px;font-weight:600;color:#eee;}
  .meta{color:#888;font-size:11px;margin-bottom:14px;}
  .meta button{background:#222;border:1px solid #333;color:#aaa;padding:4px 10px;border-radius:3px;font-family:inherit;font-size:11px;cursor:pointer;margin-left:8px;}
  .meta button:hover{background:#2a2a2a;}
  section{margin-top:26px;}
  section h2{font-size:11px;font-weight:600;color:#bbb;text-transform:uppercase;letter-spacing:0.8px;margin:0 0 6px;border-bottom:1px solid #2a2a2a;padding-bottom:4px;}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:11px;}
  th{text-align:left;padding:6px 8px;color:#888;font-weight:500;border-bottom:1px solid #2a2a2a;background:#141414;white-space:nowrap;}
  td{padding:5px 8px;border-bottom:1px solid #1a1a1a;color:#ccc;vertical-align:top;}
  tr:hover td{background:#151515;}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;}
  td.muted{color:#666;}
  td.wrap{white-space:normal;word-break:break-all;}
  .pill{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;background:#222;color:#888;margin-right:4px;}
  .pill.ok{background:#1a3a1a;color:#8acc8a;}
  .err{background:#2a1010;border:1px solid #5a2020;color:#ffb3b3;padding:12px;border-radius:4px;font-size:11px;white-space:pre-wrap;margin:14px 0;}
  .login-card{max-width:380px;margin:80px auto;padding:20px;border:1px solid #2a2a2a;border-radius:6px;background:#141414;}
  .login-card p{color:#aaa;margin:0 0 14px;font-size:12px;line-height:1.6;}
  .login-card input,.login-card button{width:100%;padding:9px 12px;margin-bottom:8px;background:#0c0c0c;border:1px solid #2a2a2a;border-radius:4px;color:#ddd;font-family:inherit;font-size:12px;box-sizing:border-box;}
  .login-card button{background:#2a2a2a;cursor:pointer;}
  .login-card button:hover{background:#333;}
  .login-err{color:#ff8888;font-size:11px;margin-top:4px;min-height:14px;}
  a{color:#8ab4ff;}
  pre{margin:0;font:inherit;color:#888;white-space:pre-wrap;word-break:break-all;}
</style>
</head>
<body>

<div id="boot"></div>
<div id="app" class="wrap" style="display:none;">
  <h1>Stay Hard · Data</h1>
  <div class="meta">
    <span id="gen-at">—</span>
    <button id="refresh-btn">refresh</button>
    <button id="logout-btn">logout</button>
  </div>
  <div id="content"></div>
</div>

<script>
const SB_URL='https://uvaosxhsjscigheyymus.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2YW9zeGhzanNjaWdoZXl5bXVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODExNjQsImV4cCI6MjA5MDE1NzE2NH0.aS1ZxN0ds8CUs3q_dMTFlEwjvNFgCH7JwY-tg4q0NA8';
const sb=supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true}});

const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtTime=t=>{if(!t)return'—';const d=new Date(t);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};
const fmtDate=d=>d?String(d).slice(0,10):'—';

function showBoot(html){
  document.getElementById('app').style.display='none';
  document.getElementById('boot').innerHTML=`<div class="login-card">${html}</div>`;
}

async function main(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){
    showBoot(`
      <p>Log in to view data.</p>
      <input id="e" type="email" placeholder="email" autocomplete="email">
      <input id="p" type="password" placeholder="password" autocomplete="current-password">
      <button id="lb">Sign in</button>
      <div class="login-err" id="le"></div>
    `);
    document.getElementById('lb').onclick=async()=>{
      const e=document.getElementById('e').value.trim();
      const p=document.getElementById('p').value;
      const err=document.getElementById('le');
      err.textContent='';
      const {error}=await sb.auth.signInWithPassword({email:e,password:p});
      if(error){err.textContent=error.message;return;}
      location.reload();
    };
    return;
  }
  const {data:profile,error:pErr}=await sb.from('profiles').select('id,display_name,is_admin').eq('id',session.user.id).maybeSingle();
  if(pErr){showBoot(`<p>Profile fetch error:</p><div class="err">${esc(pErr.message)}</div>`);return;}
  if(!profile||!profile.is_admin){
    showBoot(`
      <p>Account <b>${esc(session.user.email)}</b> is not admin.</p>
      <p style="color:#888;font-size:11px;">Run in Supabase SQL Editor:</p>
      <pre style="background:#0c0c0c;padding:10px;border-radius:4px;border:1px solid #2a2a2a;color:#aaa;">UPDATE profiles SET is_admin = true
WHERE id = '${session.user.id}';</pre>
      <button onclick="location.reload()" style="margin-top:10px;">Refresh</button>
      <button onclick="(async()=>{await sb.auth.signOut();location.reload();})()" style="margin-top:4px;background:#1a1a1a;">Logout</button>
    `);
    return;
  }
  document.getElementById('boot').innerHTML='';
  document.getElementById('app').style.display='block';
  await load();
}

async function load(){
  const content=document.getElementById('content');
  content.innerHTML='<div style="color:#666;padding:20px 0;">loading...</div>';
  const {data,error}=await sb.rpc('admin_dashboard');
  if(error){
    const missing=/does not exist/i.test(error.message||'');
    const needs004=/all_users|recent_events|recent_logs/i.test(error.message||'')||(data&&!('all_users' in (data||{})));
    content.innerHTML=`<div class="err">admin_dashboard() failed: ${esc(error.message)}
code: ${error.code||'—'}
hint: ${error.hint||'—'}${missing?'\n\nRun migrations/003_analytics_events.sql in Supabase SQL Editor.':''}</div>`;
    return;
  }
  if(!('all_users' in data)){
    content.innerHTML=`<div class="err">admin_dashboard() needs update. Run migrations/004_admin_dashboard_full_data.sql in Supabase SQL Editor.
Link: <a href="https://raw.githubusercontent.com/starckato/StayHard/main/migrations/004_admin_dashboard_full_data.sql" target="_blank">open raw SQL</a></div>`;
    return;
  }
  render(data);
}

function render(d){
  document.getElementById('gen-at').textContent='@ '+fmtTime(d.generated_at);
  const users=d.all_users||[];
  const events=d.recent_events||[];
  const logs=d.recent_logs||[];
  const counts=Object.entries(d.event_counts_7d||{}).sort((a,b)=>b[1]-a[1]);

  const totals=`
    <span class="pill">users ${d.signups_total||0}</span>
    <span class="pill">+7d ${d.signups_7d||0}</span>
    <span class="pill">DAU ${d.dau||0}</span>
    <span class="pill">WAU ${d.wau||0}</span>
    <span class="pill">MAU ${d.mau||0}</span>
    <span class="pill">events(7d) ${counts.reduce((a,[,c])=>a+c,0)}</span>
    <span class="pill">comp-active ${d.competitions?.active||0}</span>`;

  let html=`<div style="margin-bottom:10px;">${totals}</div>`;

  // Users
  html+=`<section><h2>users · ${users.length}</h2><div class="table-wrap"><table><thead><tr>
    <th>email</th><th>name</th><th>signed_up</th><th>onboarded</th><th>admin</th>
    <th class="num">score</th><th class="num">log_days</th><th>last_log</th>
  </tr></thead><tbody>${users.map(u=>`<tr>
    <td>${esc(u.email||'—')}</td>
    <td>${esc(u.display_name||'—')}</td>
    <td class="muted">${fmtDate(u.signed_up)}</td>
    <td>${u.onboarded?'<span class="pill ok">yes</span>':'<span class="pill">no</span>'}</td>
    <td>${u.is_admin?'<span class="pill ok">admin</span>':''}</td>
    <td class="num">${(u.total_score||0).toLocaleString()}</td>
    <td class="num">${u.log_days||0}</td>
    <td class="muted">${fmtDate(u.last_log)}</td>
  </tr>`).join('')||'<tr><td colspan="8" class="muted" style="text-align:center;padding:14px;">no users</td></tr>'}</tbody></table></div></section>`;

  // Events
  html+=`<section><h2>events · last ${events.length}</h2><div class="table-wrap"><table><thead><tr>
    <th>time</th><th>user</th><th>event</th><th>meta</th>
  </tr></thead><tbody>${events.map(e=>`<tr>
    <td class="muted">${fmtTime(e.created_at)}</td>
    <td>${esc(e.user_name||e.user_id?.slice(0,8)||'—')}</td>
    <td>${esc(e.event_name)}</td>
    <td class="muted wrap"><pre>${esc(JSON.stringify(e.meta||{}))}</pre></td>
  </tr>`).join('')||'<tr><td colspan="4" class="muted" style="text-align:center;padding:14px;">no events yet</td></tr>'}</tbody></table></div></section>`;

  // Daily logs
  html+=`<section><h2>daily_logs · last ${logs.length}</h2><div class="table-wrap"><table><thead><tr>
    <th>date</th><th>user</th><th class="num">weight</th><th class="num">water</th><th class="num">meals</th><th class="num">workouts</th><th class="num">mandatory</th><th class="num">targets</th>
  </tr></thead><tbody>${logs.map(l=>`<tr>
    <td class="muted">${fmtDate(l.log_date)}</td>
    <td>${esc(l.display_name||l.user_id?.slice(0,8)||'—')}</td>
    <td class="num">${l.weight??'—'}</td>
    <td class="num">${l.water_cups||0}</td>
    <td class="num">${l.meals_count||0}</td>
    <td class="num">${l.workouts_count||0}</td>
    <td class="num">${l.mandatory_count||0}</td>
    <td class="num">${l.targets_count||0}</td>
  </tr>`).join('')||'<tr><td colspan="8" class="muted" style="text-align:center;padding:14px;">no logs yet</td></tr>'}</tbody></table></div></section>`;

  // Event counts (sidebar-style small table)
  html+=`<section><h2>event counts · last 7d</h2><div class="table-wrap"><table><thead><tr>
    <th>event</th><th class="num">count</th>
  </tr></thead><tbody>${counts.map(([n,c])=>`<tr>
    <td>${esc(n)}</td><td class="num">${c}</td>
  </tr>`).join('')||'<tr><td colspan="2" class="muted" style="text-align:center;padding:14px;">no events tracked yet</td></tr>'}</tbody></table></div></section>`;

  // Competitions
  html+=`<section><h2>competitions</h2><div class="table-wrap"><table><thead><tr>
    <th>status</th><th class="num">count</th>
  </tr></thead><tbody>
    <tr><td>active</td><td class="num">${d.competitions?.active||0}</td></tr>
    <tr><td>completed</td><td class="num">${d.competitions?.completed||0}</td></tr>
    <tr><td>waiting</td><td class="num">${d.competitions?.waiting||0}</td></tr>
  </tbody></table></div></section>`;

  document.getElementById('content').innerHTML=html;
}

document.getElementById('refresh-btn').onclick=load;
document.getElementById('logout-btn').onclick=async()=>{await sb.auth.signOut();location.reload();};
main();
</script>
</body>
</html>
